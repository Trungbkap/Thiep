    <script>
        // 🔔 Ngày bạn muốn đếm ngược tới (YYYY-MM-DD HH:MM:SS)
        const targetDate = new Date("2026-03-08 10:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("mins").innerText = "00";
                document.getElementById("secs").innerText = "00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, "0");
            document.getElementById("hours").innerText = hours.toString().padStart(2, "0");
            document.getElementById("mins").innerText = mins.toString().padStart(2, "0");
            document.getElementById("secs").innerText = secs.toString().padStart(2, "0");
        }

        // chạy lần đầu
        updateCountdown();

        // cập nhật mỗi giây
        setInterval(updateCountdown, 1000);
    </script>

<script>
let autoScroll = true;
let scrollSpeed = 10; // số càng nhỏ → càng chậm (0.2 rất mượt, 0.6 nhanh hơn)

function startAutoScroll() {
    const interval = setInterval(() => {
        if (!autoScroll) return;

        window.scrollBy(0, scrollSpeed);

        // nếu tới cuối trang thì dừng
        if ((window.innerHeight + window.scrollY) >= document.body.scrollHeight) {
            clearInterval(interval);
        }
    }, 20); // mỗi 20ms cuộn 1 chút
}

// chạy sau khi load
setTimeout(startAutoScroll, 2000);

// nếu người dùng chạm / cuộn → dừng
window.addEventListener("wheel", () => autoScroll = false);
window.addEventListener("touchstart", () => autoScroll = false);
</script>

